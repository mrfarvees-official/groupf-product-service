name: Deploy Product Service to Azure VM

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Show repo
        run: |
          echo "Running repo is: $GITHUB_REPOSITORY"
          echo "Running branch is: $GITHUB_REF_NAME"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check values
        env:
          AZURE_HOST: ${{ vars.AZURE_HOST }}
          AZURE_USER: ${{ vars.AZURE_USER }}
          DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
          AZURE_SSH_KEY: ${{ secrets.AZURE_SSH_KEY }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -z "$AZURE_HOST" ]; then echo "AZURE_HOST variable missing"; exit 1; else echo "AZURE_HOST variable exists"; fi
          if [ -z "$AZURE_USER" ]; then echo "AZURE_USER variable missing"; exit 1; else echo "AZURE_USER variable exists"; fi
          if [ -z "$DOCKER_USERNAME" ]; then echo "DOCKER_USERNAME variable missing"; exit 1; else echo "DOCKER_USERNAME variable exists"; fi
          if [ -z "$AZURE_SSH_KEY" ]; then echo "AZURE_SSH_KEY secret missing"; exit 1; else echo "AZURE_SSH_KEY secret exists"; fi
          if [ -z "$DOCKER_PASSWORD" ]; then echo "DOCKER_PASSWORD secret missing"; exit 1; else echo "DOCKER_PASSWORD secret exists"; fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ vars.DOCKER_USERNAME }}/groupf-product-service:latest .
          docker push ${{ vars.DOCKER_USERNAME }}/groupf-product-service:latest

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.AZURE_HOST }}
          username: ${{ vars.AZURE_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          port: 22
          script: |
            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ vars.DOCKER_USERNAME }}" --password-stdin
            sudo docker pull ${{ vars.DOCKER_USERNAME }}/groupf-product-service:latest
            sudo docker stop groupf-product-service || true
            sudo docker rm groupf-product-service || true
            sudo docker run -d --name groupf-product-service --restart always -p 3001:3001 ${{ vars.DOCKER_USERNAME }}/groupf-product-service:latest
            sudo docker image prune -f
            sudo docker ps