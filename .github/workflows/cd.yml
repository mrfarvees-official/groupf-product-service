name: Deploy Product Service to Azure VM

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check secrets
        run: |
          if [ -z "${{ secrets.AZURE_HOST }}" ]; then echo "AZURE_HOST missing"; exit 1; else echo "AZURE_HOST exists"; fi
          if [ -z "${{ secrets.AZURE_USER }}" ]; then echo "AZURE_USER missing"; exit 1; else echo "AZURE_USER exists"; fi
          if [ -z "${{ secrets.AZURE_SSH_KEY }}" ]; then echo "AZURE_SSH_KEY missing"; exit 1; else echo "AZURE_SSH_KEY exists"; fi
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then echo "DOCKER_USERNAME missing"; exit 1; else echo "DOCKER_USERNAME exists"; fi
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then echo "DOCKER_PASSWORD missing"; exit 1; else echo "DOCKER_PASSWORD exists"; fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/groupf-product-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/groupf-product-service:latest

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          port: 22
          script: |
            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/groupf-product-service:latest
            sudo docker stop groupf-product-service || true
            sudo docker rm groupf-product-service || true
            sudo docker run -d --name groupf-product-service --restart always -p 3001:3001 ${{ secrets.DOCKER_USERNAME }}/groupf-product-service:latest
            sudo docker image prune -f
            sudo docker ps