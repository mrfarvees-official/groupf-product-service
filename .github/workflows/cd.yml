name: Deploy Product Service to Azure VM

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          port: 22
          script: |
            mkdir -p ~/groupf-product-service
            cd ~/groupf-product-service

            cat > docker-compose.yml << 'EOF'
            services:
              postgres:
                image: postgres:16-alpine
                container_name: product_service_postgres
                restart: always
                ports:
                  - "5433:5432"
                environment:
                  POSTGRES_DB: product_db
                  POSTGRES_USER: groupf
                  POSTGRES_PASSWORD: groupf
                volumes:
                  - postgres_product_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U groupf -d product_db"]
                  interval: 5s
                  timeout: 5s
                  retries: 10
                networks:
                  - product_service_network

              product_service:
                image: farvees/groupf-product-service:latest
                container_name: groupf_product_service
                restart: always
                ports:
                  - "3001:3001"
                environment:
                  SERVER_PORT: 3001
                  POSTGRES_HOST: postgres
                  POSTGRES_PORT: 5432
                  POSTGRES_DB: product_db
                  POSTGRES_USER: groupf
                  POSTGRES_PASSWORD: groupf
                  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/product_db
                  SPRING_DATASOURCE_USERNAME: groupf
                  SPRING_DATASOURCE_PASSWORD: groupf
                depends_on:
                  postgres:
                    condition: service_healthy
                networks:
                  - product_service_network

            volumes:
              postgres_product_data:

            networks:
              product_service_network:
                driver: bridge
            EOF

            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            sudo docker compose pull
            sudo docker compose up -d
            sudo docker image prune -f
            sudo docker ps
