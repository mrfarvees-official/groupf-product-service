spring.application.name=groupf-product-service

server.port=${SERVER_PORT:3001}

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:product_db}
spring.datasource.username=${POSTGRES_USER:groupf}
spring.datasource.password=${POSTGRES_PASSWORD:groupf}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.auto-commit=true

server.error.include-message=always
server.error.include-binding-errors=always